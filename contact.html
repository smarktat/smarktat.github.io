<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Smark Tat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { gold: '#FFD700', dark: '#000000' } } } } }
    </script>
    <style>body { background-color: #000000; color: #F5F5F5; }</style>
</head>
<body class="flex flex-col min-h-screen">
    <nav class="h-20 border-b border-gray-900 px-4 flex justify-between items-center bg-brand-dark">
        <a href="index.html" class="font-black text-2xl uppercase">Smark <span class="text-brand-gold">Tat</span></a>
        <a href="index.html" class="text-gray-400 font-bold uppercase text-xs">Back Home</a>
    </nav>
    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="max-w-xl w-full bg-gray-900 border border-gray-800 p-8 rounded-3xl">
            <h1 class="text-3xl font-black uppercase mb-2">Book Smark Tat</h1>
            <p class="text-gray-400 mb-8">For performances, features, and business inquiries.</p>
            <form action="https://formspree.io/f/your-id" method="POST" class="space-y-4">
                <input type="text" name="name" placeholder="Full Name" class="w-full bg-black border border-gray-700 p-4 rounded-xl outline-none focus:border-brand-gold" required>
                <input type="email" name="email" placeholder="Email Address" class="w-full bg-black border border-gray-700 p-4 rounded-xl outline-none focus:border-brand-gold" required>
                <textarea name="message" placeholder="Project details / Event details" class="w-full bg-black border border-gray-700 p-4 rounded-xl h-40 outline-none focus:border-brand-gold" required></textarea>
                <button type="submit" class="w-full bg-brand-gold text-brand-dark font-black py-4 rounded-xl uppercase tracking-widest">Send Inquiry</button>
            </form>
        </div>
    </main>
</body>
</html>
