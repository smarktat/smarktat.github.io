name: Backend Process
on:
  repository_dispatch:
    types: [new_comment]
  push:
    branches: [main]

jobs:
  deploy_and_process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_PERSONAL_TOKEN }}

      - name: Process New Comment
        if: github.event_type == 'new_comment'
        run: |
          mkdir -p fan_pics
          echo "${{ github.event.client_payload.image_data }}" | base64 -d > fan_pics/${{ github.event.client_payload.image_name }}
          if [ ! -f comments.json ]; then echo "[]" > comments.json; fi
          NEW_ENTRY=$(jq -n \
            --arg n "${{ github.event.client_payload.name }}" \
            --arg m "${{ github.event.client_payload.message }}" \
            --arg i "fan_pics/${{ github.event.client_payload.image_name }}" \
            '{name: $n, message: $m, image: $i}')
          jq ". += [$NEW_ENTRY]" comments.json > temp.json && mv temp.json comments.json
          git config --global user.name "Smark-Backend"
          git config --global user.email "smarktat@github.io"
          git add fan_pics/ comments.json
          git commit -m "Fan Wall Update: ${{ github.event.client_payload.name }}"
          git push origin main

      - name: Inject Restricted Token
        run: |
          sed -i "s|{{INJECTED_TOKEN}}|${{ secrets.COMMENTS_API_TOKEN }}|g" comments.html
          git config --global user.name "Smark-Backend"
          git config --global user.email "smarktat@github.io"
          git add comments.html
          git commit -m "Production Build: Token Injection" || echo "No changes"
          git push origin main