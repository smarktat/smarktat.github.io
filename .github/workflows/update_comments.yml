name: Comment Backend
on:
  repository_dispatch:
    types: [new_comment]
jobs:
  update_json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.MY_PERSONAL_TOKEN }}
      - name: Process Comment
        run: |
          NAME="${{ github.event.client_payload.name }}"
          PIC="${{ github.event.client_payload.pic }}"
          TEXT="${{ github.event.client_payload.text }}"
          if [ ! -f comments.json ]; then echo "[]" > comments.json; fi
          jq ". += [{\"name\": \"$NAME\", \"pic\": \"$PIC\", \"text\": \"$TEXT\"}]" comments.json > temp.json && mv temp.json comments.json
      - name: Save Changes
        run: |
          git config --global user.name "SmarkTat-Bot"
          git config --global user.email "bot@smarktat.github.io"
          git add comments.json
          git commit -m "New fan comment added"
          git push