<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fan Zone | Smark Tat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { gold: '#FFD700', dark: '#000000' } }
                }
            }
        }
    </script>
    <style>body { background-color: #000000; color: #F5F5F5; }</style>
</head>
<body class="antialiased flex flex-col min-h-screen">
    <nav class="bg-brand-dark fixed w-full z-50 top-0 border-b border-gray-900">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <a href="index.html" class="font-black text-2xl text-white uppercase">Smark <span class="text-brand-gold">Tat</span></a>
            <div class="hidden md:flex space-x-8 uppercase font-bold text-xs">
                <a href="index.html" class="text-gray-400">Home</a>
                <a href="about.html" class="text-gray-400">About</a>
                <a href="music.html" class="text-gray-400">Music</a>
                <a href="comments.html" class="text-brand-gold">Fan Zone</a>
                <a href="contact.html" class="bg-brand-gold text-brand-dark px-6 py-2 rounded-full">Bookings</a>
            </div>
        </div>
    </nav>
    <main class="flex-grow pt-32 px-4 max-w-3xl mx-auto w-full">
        <h1 class="text-4xl font-black uppercase mb-10 text-center">Fan Zone</h1>
        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 mb-12">
            <h2 class="text-xl font-bold mb-4">Leave a Comment</h2>
            <form id="commentForm" class="space-y-4">
                <input type="text" id="fanName" placeholder="Your Name" class="w-full bg-black border border-gray-700 p-3 rounded-lg focus:border-brand-gold outline-none" required>
                <textarea id="fanMessage" placeholder="Drop your message..." class="w-full bg-black border border-gray-700 p-3 rounded-lg h-32 focus:border-brand-gold outline-none" required></textarea>
                <button type="submit" class="bg-brand-gold text-brand-dark font-black w-full py-3 rounded-lg uppercase">Post Comment</button>
            </form>
        </div>
        <div id="commentsDisplay" class="space-y-6"></div>
    </main>
    <script>
        async function loadComments() {
            const res = await fetch('comments.json');
            const data = await res.json();
            const container = document.getElementById('commentsDisplay');
            container.innerHTML = data.map(c => `
                <div class="flex gap-4 p-4 border-b border-gray-800">
                    <img src="${c.image || 'https://via.placeholder.com/50'}" class="w-12 h-12 rounded-full border border-brand-gold">
                    <div>
                        <h4 class="font-bold text-brand-gold">${c.name}</h4>
                        <p class="text-gray-300 text-sm">${c.message}</p>
                    </div>
                </div>
            `).join('');
        }
        document.getElementById('commentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('fanName').value;
            const message = document.getElementById('fanMessage').value;
            alert('Triggering GitHub Action to update JSON...');
        });
        loadComments();
    </script>
</body>
</html>
