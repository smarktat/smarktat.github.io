<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smark Tat | Fan Comments</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white font-sans overflow-x-hidden">
<nav class="bg-zinc-900 border-b border-zinc-800 fixed w-full top-0 z-50">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
<a href="index.html" class="text-2xl font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">SMARK TAT</a>
<div class="hidden md:flex space-x-8">
<a href="index.html" class="hover:text-emerald-400 transition">Home</a>
<a href="about.html" class="hover:text-emerald-400 transition">About</a>
<a href="music.html" class="hover:text-emerald-400 transition">Music</a>
<a href="comments.html" class="text-emerald-400 font-medium">Comments</a>
<a href="contact.html" class="hover:text-emerald-400 transition">Contact</a>
<a href="developer.html" class="hover:text-emerald-400 transition">Developer</a>
</div>
<button id="menuBtn" class="md:hidden text-zinc-300 focus:outline-none">
<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
</button>
</div>
<div id="mobileMenu" class="hidden bg-zinc-900 border-b border-zinc-800 px-4 pt-2 pb-4 space-y-2">
<a href="index.html" class="block hover:text-emerald-400 transition py-2">Home</a>
<a href="about.html" class="block hover:text-emerald-400 transition py-2">About</a>
<a href="music.html" class="block hover:text-emerald-400 transition py-2">Music</a>
<a href="comments.html" class="block text-emerald-400 font-medium py-2">Comments</a>
<a href="contact.html" class="block hover:text-emerald-400 transition py-2">Contact</a>
<a href="developer.html" class="block hover:text-emerald-400 transition py-2">Developer</a>
</div>
</nav>
<main class="mt-24 max-w-4xl mx-auto px-6 mb-20">
<h1 class="text-4xl font-bold mb-8 text-emerald-400">Fan Wall</h1>
<div class="bg-zinc-900 p-6 rounded-2xl shadow-xl border border-zinc-800 mb-10">
<form id="commentForm" class="space-y-4">
<div>
<label class="block text-sm font-medium text-zinc-400 mb-1">Your Name</label>
<input type="text" id="name" required class="w-full bg-zinc-800 border border-zinc-700 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500">
</div>
<div>
<label class="block text-sm font-medium text-zinc-400 mb-1">Profile Picture URL</label>
<input type="url" id="pic" required class="w-full bg-zinc-800 border border-zinc-700 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500">
</div>
<div>
<label class="block text-sm font-medium text-zinc-400 mb-1">Comment</label>
<textarea id="text" rows="3" required class="w-full bg-zinc-800 border border-zinc-700 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500"></textarea>
</div>
<button type="submit" class="bg-emerald-500 hover:bg-emerald-400 text-zinc-950 font-bold py-3 px-6 rounded-lg transition w-full">
Post Comment via GitHub Actions
</button>
</form>
</div>
<div id="commentsContainer" class="space-y-6"></div>
</main>
<script>
document.getElementById('menuBtn').addEventListener('click', function() {
document.getElementById('mobileMenu').classList.toggle('hidden');
});
const loadComments = async () => {
try {
const res = await fetch('comments.json');
if (!res.ok) throw new Error('No comments yet');
const data = await res.json();
const container = document.getElementById('commentsContainer');
container.innerHTML = '';
data.forEach(comment => {
const div = document.createElement('div');
div.className = 'bg-zinc-900 p-5 rounded-2xl border border-zinc-800 flex items-start space-x-4';
div.innerHTML = `<img src="${comment.pic}" class="w-14 h-14 rounded-full border-2 border-emerald-500 object-cover flex-shrink-0"><div class="flex-1"><h4 class="font-bold text-lg text-emerald-400">${comment.name}</h4><p class="text-zinc-300 mt-1">${comment.text}</p></div>`;
container.appendChild(div);
});
} catch (e) {
document.getElementById('commentsContainer').innerHTML = '<p class="text-zinc-500 italic">Be the first to comment!</p>';
}
};
document.getElementById('commentForm').addEventListener('submit', async (e) => {
e.preventDefault();
const name = document.getElementById('name').value;
const pic = document.getElementById('pic').value;
const text = document.getElementById('text').value;
try {
await fetch('https://api.github.com/repos/smrktat/smarktat.github.io/dispatches', {
method: 'POST',
headers: {
'Accept': 'application/vnd.github.v3+json',
'Authorization': 'token YOUR_DISPATCH_TOKEN'
},
body: JSON.stringify({
event_type: 'new_comment',
client_payload: { name, pic, text }
})
});
alert('Comment dispatched to your repo! GitHub Actions is updating the JSON file.');
document.getElementById('commentForm').reset();
} catch (error) {
alert('Error dispatching action.');
}
});
window.onload = loadComments;
</script>
</body>
</html>
