    <main class="flex-grow pt-32 px-4">
        <div class="max-w-3xl mx-auto">
            <h1 class="font-heading font-black text-4xl text-white uppercase mb-12 text-center tracking-tighter">Fan Wall</h1>
            
            <div class="bg-brand-gray border border-gray-800 p-8 rounded-3xl mb-12">
                <form id="commentForm" class="space-y-6">
                    <input type="text" id="fanName" placeholder="NAME" class="w-full bg-black border border-gray-800 p-4 rounded-xl focus:border-brand-gold outline-none text-white uppercase font-bold text-sm tracking-widest" required>
                    <div class="bg-black border border-gray-800 p-4 rounded-xl">
                        <label class="block text-gray-500 text-[10px] uppercase mb-2 font-black tracking-widest">Select Profile Image</label>
                        <input type="file" id="fanPhoto" accept="image/*" class="text-xs text-gray-400" required>
                    </div>
                    <textarea id="fanMessage" placeholder="MESSAGE" class="w-full bg-black border border-gray-800 p-4 rounded-xl h-32 focus:border-brand-gold outline-none text-white font-semibold text-sm" required></textarea>
                    <button type="submit" id="submitBtn" class="w-full bg-brand-gold text-brand-dark font-black py-4 rounded-xl uppercase tracking-widest btn-hover">Post Comment</button>
                </form>
            </div>

            <div id="commentsDisplay" class="space-y-6 pb-20"></div>
        </div>
    </main>

    <footer class="bg-brand-gray py-12 border-t border-gray-800 text-center">
        <p class="text-gray-600 text-[10px] uppercase tracking-[0.3em] font-bold">Dev by <a href="developer.html" class="text-brand-gold hover:text-white transition">Icii White</a></p>
    </footer>

    <script>
        const btn = document.getElementById('mobile-menu-btn');
        const menu = document.getElementById('mobile-menu');
        btn.addEventListener('click', () => {
            menu.classList.toggle('hidden');
            document.getElementById('menu-icon').classList.toggle('hidden');
            document.getElementById('close-icon').classList.toggle('hidden');
        });

        const GITHUB_TOKEN = ""; 
        const REPO_OWNER = "smarktat";
        const REPO_NAME = "smarktat.github.io";

        async function loadComments() {
            try {
                const res = await fetch('comments.json');
                const data = await res.json();
                document.getElementById('commentsDisplay').innerHTML = data.reverse().map(c => `
                    <div class="flex gap-4 p-6 bg-brand-gray border border-gray-900 rounded-2xl">
                        <img src="${c.image}" class="w-14 h-14 rounded-full object-cover border-2 border-brand-gold">
                        <div>
                            <h4 class="font-bold text-white uppercase text-[10px] tracking-widest">${c.name}</h4>
                            <p class="text-gray-400 mt-2 text-sm leading-relaxed">${c.message}</p>
                        </div>
                    </div>
                `).join('');
            } catch (e) {}
        }

        document.getElementById('commentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "PROCESSING...";
            submitBtn.disabled = true;

            const name = document.getElementById('fanName').value;
            const message = document.getElementById('fanMessage').value;
            const file = document.getElementById('fanPhoto').files[0];

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64Image = reader.result.split(',')[1];
                
                try {
                    await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/dispatches`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Accept': 'application/vnd.github.v3+json'
                        },
                        body: JSON.stringify({
                            event_type: 'new_comment',
                            client_payload: {
                                name: name,
                                message: message,
                                image_data: base64Image,
                                image_name: `${Date.now()}_fan.jpg`
                            }
                        })
                    });
                    alert("POSTED. UPDATE LIVE IN 60s.");
                    location.reload();
                } catch (err) {
                    alert("ERROR.");
                    submitBtn.disabled = false;
                    submitBtn.innerText = "POST COMMENT";
                }
            };
        });
        loadComments();
    </script>
