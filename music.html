<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music | Smark Tat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { heading: ['Montserrat', 'sans-serif'] },
                    colors: { brand: { gold: '#FFD700', dark: '#000000' } }
                }
            }
        }
    </script>
    <style>body { background-color: #000000; color: #F5F5F5; }</style>
</head>
<body class="antialiased flex flex-col min-h-screen">
    <nav class="bg-brand-dark bg-opacity-95 backdrop-blur-md fixed w-full z-50 top-0 left-0 border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex-shrink-0 flex items-center">
                    <a href="index.html" class="font-heading font-black text-2xl tracking-tighter text-white uppercase">Smark <span class="text-brand-gold">Tat</span></a>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="index.html" class="text-gray-300 hover:text-white font-semibold text-sm uppercase tracking-wider">Home</a>
                    <a href="about.html" class="text-gray-300 hover:text-white font-semibold text-sm uppercase tracking-wider">About</a>
                    <a href="music.html" class="text-brand-gold font-semibold text-sm uppercase tracking-wider">Music</a>
                    <a href="comments.html" class="text-gray-300 hover:text-white font-semibold text-sm uppercase tracking-wider">Fan Zone</a>
                    <a href="contact.html" class="bg-brand-gold text-brand-dark px-6 py-2 rounded-full font-bold uppercase tracking-wider">Bookings</a>
                </div>
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-btn" class="text-gray-300 focus:outline-none">
                        <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path id="menu-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                            <path id="close-icon" class="hidden" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-brand-dark border-b border-gray-800 absolute w-full left-0">
            <div class="px-4 pt-2 pb-6 space-y-2 flex flex-col items-center">
                <a href="index.html" class="text-gray-300 font-semibold text-lg py-3">Home</a>
                <a href="about.html" class="text-gray-300 font-semibold text-lg py-3">About</a>
                <a href="music.html" class="text-brand-gold font-semibold text-lg py-3">Music</a>
                <a href="comments.html" class="text-gray-300 font-semibold text-lg py-3">Fan Zone</a>
                <a href="contact.html" class="bg-brand-gold text-brand-dark font-bold text-lg py-3 rounded-lg mt-4 w-full text-center">Bookings</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-32 px-4">
        <div class="max-w-4xl mx-auto">
            <h1 class="font-heading font-black text-4xl md:text-6xl text-white uppercase mb-12 text-center">The Music</h1>
            <div class="bg-gray-900 border border-gray-800 rounded-3xl overflow-hidden flex flex-col md:flex-row">
                <div class="md:w-1/2 h-64 md:h-auto">
                    <img src="me.png" alt="Ndongo Yoka" class="w-full h-full object-cover">
                </div>
                <div class="p-8 md:w-1/2 flex flex-col justify-center">
                    <h2 class="text-3xl font-black text-white mb-2 uppercase">Ndongo Yoka</h2>
                    <p class="text-brand-gold font-bold mb-6">Debut Single</p>
                    <p class="text-gray-400 mb-8 leading-relaxed">The high-energy anthem that introduced Smark Tat to the world. A perfect blend of modern percussion and Ugandan soul.</p>
                    <a href="#" class="bg-white text-black text-center font-bold py-4 rounded-xl hover:bg-brand-gold transition">Listen Now</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-brand-dark py-12 border-t border-gray-800 mt-20">
        <div class="max-w-7xl mx-auto px-4 flex flex-col items-center">
            <p class="text-gray-600 text-xs uppercase tracking-widest">Dev by <a href="developer.html" class="text-brand-gold">Icii White</a></p>
        </div>
    </footer>

    <script>
        const btn = document.getElementById('mobile-menu-btn');
        const menu = document.getElementById('mobile-menu');
        btn.addEventListener('click', () => {
            menu.classList.toggle('hidden');
            document.getElementById('menu-icon').classList.toggle('hidden');
            document.getElementById('close-icon').classList.toggle('hidden');
        });
    </script>
</body>
</html>
