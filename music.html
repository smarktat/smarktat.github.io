<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music | Smark Tat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { heading: ['Montserrat', 'sans-serif'] },
                    colors: { brand: { gold: '#FFD700', dark: '#000000' } }
                }
            }
        }
    </script>
    <style>body { background-color: #000000; color: #F5F5F5; }</style>
</head>
<body class="antialiased flex flex-col min-h-screen">
    <nav class="bg-brand-dark fixed w-full z-50 top-0 border-b border-gray-900">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <a href="index.html" class="font-heading font-black text-2xl text-white uppercase">Smark <span class="text-brand-gold">Tat</span></a>
            <div class="hidden md:flex space-x-8 items-center uppercase font-bold text-xs tracking-widest">
                <a href="index.html" class="text-gray-400 hover:text-white">Home</a>
                <a href="about.html" class="text-gray-400 hover:text-white">About</a>
                <a href="music.html" class="text-brand-gold">Music</a>
                <a href="comments.html" class="text-gray-400 hover:text-white">Fan Zone</a>
                <a href="contact.html" class="bg-brand-gold text-brand-dark px-6 py-2 rounded-full">Bookings</a>
            </div>
        </div>
    </nav>
    <main class="flex-grow pt-32 px-4">
        <div class="max-w-4xl mx-auto">
            <h1 class="font-heading font-black text-4xl md:text-6xl text-white uppercase mb-12 text-center">Discography</h1>
            <div class="bg-gray-900 border border-gray-800 rounded-3xl overflow-hidden flex flex-col md:flex-row shadow-2xl">
                <div class="md:w-1/2">
                    <img src="me.png" alt="Ndongo Yoka Cover" class="w-full h-full object-cover">
                </div>
                <div class="p-8 md:w-1/2 flex flex-col justify-center">
                    <span class="text-brand-gold font-bold uppercase tracking-widest text-sm mb-2">Latest Release</span>
                    <h2 class="font-heading font-black text-3xl text-white mb-4 uppercase">Ndongo Yoka</h2>
                    <p class="text-gray-400 mb-8">The debut single that defines the energy of Smark Tat. Stream it now on all major platforms.</p>
                    <div class="space-y-4">
                        <button class="w-full bg-white text-black font-bold py-3 rounded-xl flex items-center justify-center hover:bg-brand-gold transition">
                            Stream on Spotify
                        </button>
                        <button class="w-full bg-red-600 text-white font-bold py-3 rounded-xl flex items-center justify-center hover:bg-red-700 transition">
                            Watch on YouTube
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer class="bg-brand-dark py-12 text-center border-t border-gray-900 mt-20">
        <p class="text-gray-600 text-xs">Dev by <a href="developer.html" class="text-brand-gold">Icii White</a></p>
    </footer>
</body>
</html>
